<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipcloud — Bring your documents to life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #3696f0;
      --purple: #8654ab;
      --grad:   linear-gradient(90deg, var(--blue), var(--purple));
      --text:   #1a1a2e;
      --muted:  #5a5a72;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ─────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 60px;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo img {
      height: 80px;
      width: auto;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 38px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.1px;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--blue); }

    .btn-get-started {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 28px;
      border-radius: 50px;
      background: var(--grad);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.1px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(54, 150, 240, 0.35);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    }

    .btn-get-started:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(54, 150, 240, 0.45);
      filter: brightness(1.06);
    }

    .btn-get-started:active {
      transform: translateY(0);
      box-shadow: 0 3px 14px rgba(54, 150, 240, 0.3);
    }

    /* ── Hero ────────────────────────────────────────────── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 60px 60px;
      min-height: calc(100vh - 81px);
      gap: 48px;
    }

    .hero-left {
      flex: 0 0 auto;
      max-width: 480px;
    }

    .hero-heading {
      font-size: clamp(38px, 5vw, 58px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: var(--text);
      margin-bottom: 22px;
    }

    .hero-heading .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 400px;
      margin-bottom: 38px;
    }

    .btn-hero {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 34px;
      border-radius: 50px;
      background: var(--grad);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.1px;
      text-decoration: none;
      box-shadow: 0 6px 28px rgba(54, 150, 240, 0.38);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    }

    .btn-hero:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(54, 150, 240, 0.48);
      filter: brightness(1.06);
    }

    .btn-hero svg {
      width: 18px; height: 18px;
      transition: transform 0.2s;
    }

    .btn-hero:hover svg { transform: translateX(3px); }

    .hero-right {
      flex: 1 1 auto;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .hero-img-wrap {
      width: 100%;
      max-width: 580px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.12);
    }

    .hero-img-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Mobile ──────────────────────────────────────────── */
    @media (max-width: 860px) {
      nav { padding: 18px 24px; }
      .nav-links { display: none; }

      .hero {
        flex-direction: column;
        padding: 48px 24px 40px;
        min-height: unset;
        text-align: center;
      }

      .hero-left { max-width: 100%; }
      .hero-sub  { max-width: 100%; margin-inline: auto; }
      .hero-right { justify-content: center; }
      .hero-img-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────── -->
  <nav>
    <a class="nav-logo" href="/">
      <img src="/assets/logo.png" alt="Flipcloud" />
    </a>
    <ul class="nav-links">
      <li><a href="/features">Features</a></li>
      <li><a href="/pricing">Pricing</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/app">Login</a></li>
    </ul>
    <a class="btn-get-started" href="/app">Get Started</a>
  </nav>

  <!-- ── Hero ────────────────────────────────────────── -->
  <section class="hero">
    <div class="hero-left">
      <h1 class="hero-heading">
        Bring <span class="grad-text">your<br>documents to life</span>
      </h1>
      <p class="hero-sub">
        Create, share, and present interactive slideshows seamlessly with Flipcloud's powerful platform.
      </p>
      <a class="btn-hero" href="/app">
        Get Started Free
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="hero-right">
      <div class="hero-img-wrap">
        <img src="/assets/indeximage.png" alt="Flipcloud in action" />
      </div>
    </div>
  </section>

</body>
</html>
