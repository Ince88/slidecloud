[build]
  publish = "."

[functions]
  node_bundler = "esbuild"

# Editor app
[[redirects]]
  from   = "/app"
  to     = "/app.html"
  status = 200

# Viewer: /s/<slug>
[[redirects]]
  from   = "/s/*"
  to     = "/app.html"
  status = 200

# Presenter remote: /present/<slug>?token=...
[[redirects]]
  from   = "/present/*"
  to     = "/app.html"
  status = 200
