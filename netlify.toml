[build]
  publish = "."

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# API: proxy /api/* to Netlify functions (for local dev + deploy)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Static pages
[[redirects]]
  from   = "/features"
  to     = "/features.html"
  status = 200

[[redirects]]
  from   = "/pricing"
  to     = "/pricing.html"
  status = 200

[[redirects]]
  from   = "/about"
  to     = "/about.html"
  status = 200

# Editor app
[[redirects]]
  from   = "/app"
  to     = "/app.html"
  status = 200

# Viewer: /s/<slug>
[[redirects]]
  from   = "/s/*"
  to     = "/app.html"
  status = 200

# Presenter remote: /present/<slug>?token=...
[[redirects]]
  from   = "/present/*"
  to     = "/app.html"
  status = 200
